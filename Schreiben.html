<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schreiben | haruru666 的德语学习博客</title>
    <style>
        :root {
            --bg: #f8f4ff;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1f2937;
            --muted: #64748b;
            --accent: #7c3aed;
            --border: rgba(124, 58, 237, 0.16);
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.75;
            color: var(--text);
            background: linear-gradient(135deg, #fcf8ff 0%, #f4edff 100%);
            min-height: 100vh;
        }

        .container {
            width: min(900px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .page {
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .top-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
        }

        h1 {
            margin: 0.3rem 0 0.5rem;
            font-size: clamp(1.8rem, 2.5vw, 2.4rem);
        }

        .lead {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .card {
            margin-top: 1rem;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            background: rgba(255, 255, 255, 0.85);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 0.35rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page">
            <a class="top-link" href="index.html">← 返回首页</a>
            <h1>Schreiben</h1>
            <p class="lead">这里用来记录我的德语写作练习，包含句型、表达和小练习，帮助我把语言真正写出来。</p>

            <div class="card">
                <h3>写作目标</h3>
                <p>练习用德语写简单的自我介绍、日常感受和学习总结。</p>
            </div>

            <div class="card">
                <h3>练习示例</h3>
                <p>Ich heiße ... und ich lerne Deutsch, weil ...<br>Ich verbringe gern Zeit mit ...</p>
            </div>
        </div>
    </div>
</body>
</html>
