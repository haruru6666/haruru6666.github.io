<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haruru666 的德语学习与生活博客</title>
    <style>
        :root {
            --bg: #f5f7ff;
            --surface: rgba(255, 255, 255, 0.82);
            --text: #1f2937;
            --muted: #64748b;
            --accent: #6d5dfc;
            --accent-2: #38bdf8;
            --border: rgba(109, 93, 252, 0.18);
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(109, 93, 252, 0.14), transparent 28%),
                linear-gradient(135deg, #f8f7ff 0%, #eef7ff 100%);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
        }

        .container {
            width: min(1000px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            background: var(--surface);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -30px -40px auto;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2), transparent 70%);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: rgba(109, 93, 252, 0.1);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        h1 {
            margin: 0.8rem 0 0.5rem;
            font-size: clamp(1.8rem, 3vw, 2.7rem);
            line-height: 1.2;
        }

        .lead {
            margin: 0;
            font-size: 1.05rem;
            color: var(--muted);
            max-width: 720px;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-top: 1rem;
        }

        .badge {
            padding: 0.4rem 0.75rem;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.05);
            color: #334155;
            font-size: 0.92rem;
        }

        main {
            margin-top: 1.2rem;
            display: grid;
            gap: 1rem;
        }

        article {
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 1.4rem 1.5rem;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        article h2 {
            margin: 0.2rem 0 0.5rem;
            font-size: 1.35rem;
        }

        .article-meta {
            margin: 0;
            color: var(--muted);
            font-size: 0.94rem;
        }

        .article-footer {
            margin-top: 1rem;
            color: var(--accent);
            font-weight: 600;
        }

        footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (max-width: 700px) {
            .container {
                width: min(100% - 1rem, 1000px);
                padding-top: 1rem;
            }

            .hero {
                padding: 1.25rem;
            }

            article {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <p class="tag">🌿 个人博客 · 德语学习</p>
            <h1>🇩🇪 haruru666 的德语学习空间</h1>
            <p class="lead">记录语言学习、大学生活与日常思考，让每一次进步都被认真留下。</p>
            <div class="meta">
                <span class="badge">✍️ 持续更新</span>
                <span class="badge">📚 德语学习</span>
                <span class="badge">☕ 生活随记</span>
            </div>
        </header>

        <main>
            <article>
                <p class="article-meta">发布于 2026年7月16日</p>
                <h2>第一篇：我的博客开通啦！</h2>
                <p>今天终于用 GitHub Pages 和 GitHub Desktop 成功搭建了自己的个人博客！感觉非常棒。</p>
                <p>后面我会在这里分享德语学习心得（Deutsch-lernen）、大学生活点滴和各种好玩的排版。</p>
                <p class="article-footer">继续记录，继续成长 ✨</p>
            </article>
        </main>

        <footer>
            <p>© 2026 haruru666 • Powered by GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
