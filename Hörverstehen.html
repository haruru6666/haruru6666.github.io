<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hörverstehen | haruru666 的德语学习博客</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #fff8f2;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1f2937;
            --muted: #64748b;
            --accent: #d97706;
            --border: rgba(217, 119, 6, 0.16);
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.75;
            color: var(--text);
            background: linear-gradient(135deg, #fffaf4 0%, #fff2e6 100%);
            min-height: 100vh;
        }

        .container {
            width: min(900px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .page {
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .top-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
        }

        h1 {
            margin: 0.3rem 0 0.5rem;
            font-size: clamp(1.8rem, 2.5vw, 2.4rem);
        }

        .lead {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .card {
            margin-top: 1rem;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            background: rgba(255, 255, 255, 0.85);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 0.35rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page">
            <nav class="top-nav" aria-label="主导航">
                <a href="index.html">首页</a>
                <a href="about.html">About</a>
                <a href="DeutschLernen.html">Deutsch lernen</a>
                <a href="online-practice.html">在线练习</a>
            </nav>
            <h1>Hörverstehen</h1>
            <p class="lead">这里用来记录我的听力练习方法和一些简单的音频内容，帮助我把“听得懂”变成“听得熟”。</p>

            <div class="card">
                <h3>练习方法</h3>
                <p>先听一遍大意，再听一遍抓关键词，最后再复述一句话。这样练习会更有成效。</p>
            </div>

            <div class="card">
                <h3>今日小练习</h3>
                <p>听一句简单的德语句子，重点注意发音和语调。比如：Wie geht es dir? —— 你好吗？</p>
            </div>
        </div>
    </div>
</body>
</html>
