<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeln | haruru666 的德语学习博客</title>
    <style>
        :root {
            --bg: #f4fbff;
            --surface: rgba(255, 255, 255, 0.92);
            --text: #1f2937;
            --muted: #64748b;
            --accent: #0f766e;
            --border: rgba(15, 118, 110, 0.16);
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.75;
            color: var(--text);
            background: linear-gradient(135deg, #f7fdff 0%, #eefdf8 100%);
            min-height: 100vh;
        }

        .container {
            width: min(900px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
        }

        .page {
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .top-link {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
        }

        h1 {
            margin: 0.3rem 0 0.5rem;
            font-size: clamp(1.8rem, 2.5vw, 2.4rem);
        }

        .lead {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .card {
            margin-top: 1rem;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            background: rgba(255, 255, 255, 0.85);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 0.35rem;
        }

        .chip {
            display:inline-block;
            margin:0.2rem 0.3rem 0.2rem 0;
            padding:0.3rem 0.6rem;
            border-radius:999px;
            background: rgba(15, 118, 110, 0.1);
            color: var(--accent);
            font-size:0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page">
            <a class="top-link" href="index.html">← 返回首页</a>
            <h1>Vokabeln</h1>
            <p class="lead">这里用来记录我每天积累的德语词汇和常用表达，帮助词汇量慢慢扎实起来。</p>

            <div class="card">
                <h3>今日词汇</h3>
                <p><span class="chip">lernen</span><span class="chip">sprechen</span><span class="chip">verstehen</span><span class="chip">freundlich</span></p>
                <p>学习目标：每天积累 5～10 个新词，并尽量把它们用到一句话里。</p>
            </div>

            <div class="card">
                <h3>常用表达</h3>
                <p>Ich habe Zeit. —— 我有时间。<br>Das ist interessant. —— 这很有意思。<br>Kannst du mir helfen? —— 你能帮我一下吗？</p>
            </div>
        </div>
    </div>
</body>
</html>
